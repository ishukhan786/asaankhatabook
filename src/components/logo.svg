<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7D774"></stop>
      <stop offset="50%" stop-color="#D4AF37"></stop>
      <stop offset="100%" stop-color="#9C6B00"></stop>
    </linearGradient>

    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"></stop>
      <stop offset="100%" stop-color="#1E3A8A"></stop>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"></feDropShadow>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#blueGradient)"></rect>

  <!-- Icon -->
  <g filter="url(#shadow)">
    <!-- Ledger -->
    <rect x="120" y="110" width="272" height="292" rx="28" fill="none" stroke="url(#goldGradient)" stroke-width="12"></rect>

    <!-- Ledger Lines -->
    <line x1="160" y1="180" x2="352" y2="180" stroke="url(#goldGradient)" stroke-width="8" stroke-linecap="round"></line>

    <line x1="160" y1="220" x2="320" y2="220" stroke="url(#goldGradient)" stroke-width="8" stroke-linecap="round"></line>

    <line x1="160" y1="260" x2="352" y2="260" stroke="url(#goldGradient)" stroke-width="8" stroke-linecap="round"></line>

    <!-- Checkmark -->
    <path d="M185 330 L235 375 L330 285" fill="none" stroke="url(#goldGradient)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"></path>

    <!-- AK Monogram -->
    <circle cx="256" cy="85" r="42" fill="url(#goldGradient)"></circle>

    <text x="256" y="98" text-anchor="middle" font-family="Poppins, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0F172A">
      AK
    </text>
  </g>

  <!-- Brand Name -->
  <text x="256" y="455" text-anchor="middle" font-family="Poppins, Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#FFFFFF">
    AsaanKhata
  </text>

  <!-- Tagline -->
  <text x="256" y="485" text-anchor="middle" font-family="Poppins, Segoe UI, Arial, sans-serif" font-size="16" letter-spacing="2" fill="#C7D2FE">
    SMART ACCOUNTING
  </text>
</svg>